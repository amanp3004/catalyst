name: Send Email Digest

on:
  schedule:
    # 22:30 UTC = 4:00 AM IST — exactly 2 hours after daily-edition.yml's
    # 20:30 UTC (2:00 AM IST) run, giving generation time to fully finish
    # and commit before the email goes out. If you change the generation
    # workflow's cron time, update this one to match (+2 hours).
    - cron: "30 22 * * *"
  workflow_dispatch: {}

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send email digest
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: python send_email_digest.py
